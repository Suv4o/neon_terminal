<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline layer -->
  <rect x="4" y="2" width="9.5" height="28" rx="0.5" fill="#0a1e36"/>
  <!-- Dimmed pipe "|" -->
  <rect x="7" y="5" width="3.5" height="22" rx="0.5" fill="#ee5f53" opacity="0.7"/>
</svg>
