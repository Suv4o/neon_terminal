<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline layer (chevron) -->
  <path d="M6 6 L16 16 L6 26" fill="none" stroke="#0a1e36" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Dark outline layer (underscore) -->
  <rect x="15" y="19" width="16" height="9.5" rx="0.5" fill="#0a1e36"/>
  <!-- Glow layer -->
  <path d="M6 6 L16 16 L6 26" fill="none" stroke="#ee5f53" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter" opacity="0.3" filter="url(#glow)"/>
  <!-- Main chevron ">" (stays bright) -->
  <path d="M6 6 L16 16 L6 26" fill="none" stroke="#ee5f53" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Dimmed underscore "_" -->
  <rect x="18" y="22" width="10" height="3.5" rx="0.5" fill="#ee5f53" opacity="0.7"/>
</svg>
