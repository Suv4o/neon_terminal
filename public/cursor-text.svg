<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline layer -->
  <rect x="12" y="2" width="8" height="28" rx="0.5" fill="#0a1e36"/>
  <!-- Glow layer -->
  <rect x="14.25" y="4" width="3.5" height="24" rx="0.5" fill="#ee5f53" opacity="0.3" filter="url(#glow)"/>
  <!-- Main pipe "|" -->
  <rect x="14.25" y="4" width="3.5" height="24" rx="0.5" fill="#ee5f53"/>
</svg>
